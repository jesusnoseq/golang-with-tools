name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      golang_versions:
        description: "Go versions (JSON array)"
        required: false
        default: '["1.26.4"]'
      golangci_lint_versions:
        description: "golangci-lint versions (JSON array)"
        required: false
        default: '["v2.12.2"]'
      goimports_versions:
        description: "goimports versions (JSON array)"
        required: false
        default: '["v0.46.0"]'
      sqlc_versions:
        description: "sqlc versions (JSON array)"
        required: false
        default: '["v1.31.1"]'
      govulncheck_versions:
        description: "govulncheck versions (JSON array)"
        required: false
        default: '["v1.1.4"]'
      variants:
        description: "Base image variants (JSON array)"
        required: false
        default: '["alpine", "trixie"]'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/golang-with-tools

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        golang_version: ${{ fromJson(github.event.inputs.golang_versions || '["1.26.4"]') }}
        golangci_lint_version: ${{ fromJson(github.event.inputs.golangci_lint_versions || '["v2.12.2"]') }}
        goimports_version: ${{ fromJson(github.event.inputs.goimports_versions || '["v0.46.0"]') }}
        sqlc_version: ${{ fromJson(github.event.inputs.sqlc_versions || '["v1.31.1"]') }}
        govulncheck_version: ${{ fromJson(github.event.inputs.govulncheck_versions || '["v1.1.4"]') }}
        variant: ${{ fromJson(github.event.inputs.variants || '["alpine", "trixie"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && matrix.variant == 'alpine' }}
            type=raw,value=latest-${{ matrix.variant }},enable={{is_default_branch}}
            type=semver,pattern={{version}}-${{ matrix.variant }}
            type=semver,pattern={{major}}.{{minor}}-${{ matrix.variant }}
            type=semver,pattern={{major}}-${{ matrix.variant }}
            type=sha,prefix=sha-,suffix=-${{ matrix.variant }}
            type=raw,value=go${{ matrix.golang_version }}-${{ matrix.variant }}-lint${{ matrix.golangci_lint_version }}-imports${{ matrix.goimports_version }}-sqlc${{ matrix.sqlc_version }}-vuln${{ matrix.govulncheck_version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GOLANG_VERSION=${{ matrix.golang_version }}
            VARIANT=${{ matrix.variant }}
            GOLANGCI_LINT_VERSION=${{ matrix.golangci_lint_version }}
            GOIMPORTS_VERSION=${{ matrix.goimports_version }}
            SQLC_VERSION=${{ matrix.sqlc_version }}
            GOVULNCHECK_VERSION=${{ matrix.govulncheck_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Show generated tags
        run: |
          echo "${{ steps.meta.outputs.tags }}"